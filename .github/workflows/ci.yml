name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-lint:
    name: Security & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies (Backend)
        run: npm ci
        working-directory: ./backend

      - name: Install dependencies (Frontend)
        run: npm ci
        working-directory: ./frontend

      - name: Run Linter (Backend)
        run: npm run lint
        working-directory: ./backend

      - name: Run Linter (Frontend)
        run: npm run lint
        working-directory: ./frontend

  supabase-and-tests:
    name: Supabase & Backend Tests
    runs-on: ubuntu-latest
    needs: security-and-lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase Local
        run: supabase start

      - name: Verify Supabase DB Advisors
        run: supabase db advisors --local --type all --level warn --fail-on warn

      - name: Run pgTAP Security Tests
        run: supabase test db

      - name: Install dependencies (Backend)
        run: npm ci
        working-directory: ./backend

      - name: Run Backend Tests
        run: npm test
        working-directory: ./backend

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    needs: security-and-lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies (Frontend)
        run: npm ci
        working-directory: ./frontend

      - name: Run Frontend Tests
        run: npm test
        working-directory: ./frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend
