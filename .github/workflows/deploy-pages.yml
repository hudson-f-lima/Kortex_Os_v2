name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

# Permissões necessárias para o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy concorrente
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # DEC-28: só publica se o gatilho for manual ou se a CI/CD Pipeline
    # (lint + testes + advisors) tiver terminado com sucesso — antes, o
    # deploy disparava direto no push, independente do resultado da CI.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          # Publica exatamente o commit que a CI validou, não o HEAD atual de
          # main no momento em que este job roda (evita publicar um commit
          # mais novo que ainda não passou pela CI).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies (Frontend)
        run: npm ci
        working-directory: ./frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend
        env:
          # DEC-28: GitHub Pages serve sob /Kortex_Os_v2/ (subcaminho do domínio
          # hudson-f-lima.github.io) — Render e dev local usam o default '/' do
          # vite.config.js, não precisam desta variável.
          VITE_BASE_PATH: "/Kortex_Os_v2/"
          # Para produção no GitHub Pages, usamos a URL do backend hospedado no Render
          VITE_API_BASE_URL: "https://kortex-os-v2.onrender.com/api/v1"
          # Valores públicos (URL + chave publicável), iguais a render.yaml e ao
          # .env real deste workspace — nenhum repo secret está configurado
          # (confirmado via `gh secret list`), então o fallback abaixo sempre era
          # o valor de fato usado, e apontava para um projeto Supabase diferente
          # (lzkxmqmpxwctnysfzjwv) do que o backend/render.yaml realmente usa
          # (kpedsuklnedlhjvadiyc) — o build publicado no GitHub Pages estava
          # falando com o Supabase errado.
          VITE_SUPABASE_URL: "https://kpedsuklnedlhjvadiyc.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_zuyYub8jez-5WqURU9nBjA_OfsBabIL"

      - name: Copy index.html to 404.html (for SPA routing)
        run: cp dist/index.html dist/404.html
        working-directory: ./frontend

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
